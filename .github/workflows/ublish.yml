name: Build and publish python package

on:
  workflow_call:

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  publish-to-pypi:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # use fetch --all for setuptools_scm to work
      with:
        fetch-depth: 0
        persist-credentials: false
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: python -m pip install --upgrade pip twine

    - name: Build wheel
      run: python -m pip wheel -w dist --no-deps .

    - name: Check distribution
      run: twine check dist/*

    - name: Create attestations
      uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
      with:
        subject-path: 'dist/*'

    - name: Publish package (to TestPyPI)
      if: startsWith(github.repository, 'cpp-linter') && !startsWith(github.ref, 'refs/tags/')
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.TEST_PYPI_TOKEN }} # zizmor: ignore[secrets-outside-env]
      run: twine upload --repository testpypi dist/*

    - name: Publish package (to PyPI)
      if: startsWith(github.repository, 'cpp-linter') && startsWith(github.ref, 'refs/tags/')
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }} # zizmor: ignore[secrets-outside-env]
      run: twine upload dist/*
